<!DOCTYPE html>
<html lang="tr">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
	<title>Linki.ax | Hızlı Erişim</title>
	<meta name="description" content="Mobil odaklı hızlı bağlantı sayfası">
	<style>
		:root {
			--card-border: #0b0b0b;
			--card-bg: rgba(0, 0, 0, 0.28);
			--text: #f4f4f4;
			--shadow: 0 10px 34px rgba(0, 0, 0, 0.38);
		}

		* {
			box-sizing: border-box;
			-webkit-tap-highlight-color: transparent;
		}

		html,
		body {
			margin: 0;
			padding: 0;
			width: 100%;
			min-height: 100%;
			font-family: "Montserrat", "Poppins", "Segoe UI", sans-serif;
			color: var(--text);
			background: #000;
			overflow-x: hidden;
		}

		/* ── Video arka plan ── */
		.video-wrapper {
			position: fixed;
			inset: 0;
			z-index: 0;
			overflow: hidden;
			background: #000;
		}

		.video-bg {
			position: absolute;
			inset: 0;
			width: 100%;
			height: 100%;
			object-fit: cover;
			display: block;
		}

		.overlay {
			position: fixed;
			inset: 0;
			z-index: 1;
			background: linear-gradient(
				180deg,
				rgba(0, 0, 0, 0.30) 0%,
				rgba(0, 0, 0, 0.60) 100%
			);
		}

		.page {
			position: relative;
			z-index: 2;
			width: 100%;
			max-width: 560px;
			margin: 0 auto;
			min-height: 100svh;
			padding: calc(env(safe-area-inset-top, 0px) + 16px) 14px calc(env(safe-area-inset-bottom, 0px) + 24px);
		}

		.brand {
			text-align: center;
			margin: 4px 0 18px;
			letter-spacing: 0.08em;
			text-transform: uppercase;
			font-size: clamp(16px, 3.8vw, 22px);
			font-weight: 600;
			text-shadow: 0 2px 16px rgba(0, 0, 0, 0.6);
		}

		.cards {
			display: grid;
			gap: 12px;
		}

		.card {
			position: relative;
			display: flex;
			align-items: center;
			min-height: 88px;
			border: 7px solid var(--card-border);
			border-radius: 999px;
			background: var(--card-bg);
			color: var(--text);
			text-decoration: none;
			box-shadow: var(--shadow);
			overflow: hidden;
			transition: transform 180ms ease, background-color 220ms ease;
		}

		.card:active {
			transform: scale(0.985);
			background: rgba(0, 0, 0, 0.4);
		}

		.icon {
			width: 64px;
			height: 64px;
			margin-left: 10px;
			border-radius: 50%;
			overflow: hidden;
			border: 3px solid rgba(255, 255, 255, 0.18);
			flex: 0 0 auto;
			background: rgba(0, 0, 0, 0.5);
			display: grid;
			place-items: center;
			font-size: 32px;
			line-height: 1;
		}

		.icon img {
			width: 100%;
			height: 100%;
			object-fit: cover;
			display: block;
		}

		.label {
			flex: 1;
			text-align: center;
			padding: 0 12px 0 6px;
			font-size: clamp(19px, 5vw, 34px);
			font-weight: 500;
			letter-spacing: 0.02em;
			text-transform: uppercase;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
			text-shadow: 0 2px 10px rgba(0, 0, 0, 0.55);
		}

		.hint {
			text-align: center;
			margin-top: 14px;
			font-size: 12px;
			letter-spacing: 0.08em;
			text-transform: uppercase;
			opacity: 0.78;
		}

		.video-fallback {
			position: fixed;
			left: 50%;
			top: calc(env(safe-area-inset-top, 0px) + 12px);
			transform: translateX(-50%);
			z-index: 10;
			border: 2px solid rgba(255, 255, 255, 0.32);
			border-radius: 999px;
			padding: 10px 16px;
			background: rgba(0, 0, 0, 0.55);
			color: #fff;
			font-size: 13px;
			font-weight: 600;
			letter-spacing: 0.03em;
			display: none;
		}

		@media (min-width: 700px) {
			.page {
				padding-left: 22px;
				padding-right: 22px;
			}

			.cards {
				gap: 14px;
			}

			.card {
				min-height: 94px;
			}

			.label {
				font-size: clamp(22px, 2.4vw, 30px);
			}
		}
	</style>
</head>
<body>
	<div class="video-wrapper" aria-hidden="true">
		<video id="bgVideo" class="video-bg"
			autoplay muted loop playsinline
			x-webkit-airplay="deny"
			disableremoteplayback
			preload="auto"
			poster="images/Adsız tasarım (5).png"
			src="linkac/Playwrite US Modern.mp4"
			data-fallback-src="linkac/Playwrite US Modern.mp4">
		</video>
	</div>
	<div class="overlay" aria-hidden="true"></div>
	<button id="videoFallbackBtn" class="video-fallback" type="button">▶ Videoyu Oynat</button>

	<main class="page">
		<h1 class="brand">Üçler Gül Kuyumculuk</h1>

		<section class="cards" aria-label="Hızlı bağlantılar">
			<a class="card" href="https://wa.me/903122726261" target="_blank" rel="noopener noreferrer" aria-label="WhatsApp hızlı sipariş">
				<span class="icon">💬</span>
				<span class="label">Hızlı Sipariş</span>
			</a>

			<a class="card" href="urunler_yeni.html" aria-label="Güvenli alışveriş ürünler">
				<span class="icon">🛒</span>
				<span class="label">Güvenli Alışveriş</span>
			</a>

			<a class="card" href="https://maps.app.goo.gl/" target="_blank" rel="noopener noreferrer" aria-label="D Diamond Forum konum">
				<span class="icon">📍</span>
				<span class="label">D Diamond Forum</span>
			</a>

			<a class="card" href="https://maps.app.goo.gl/" target="_blank" rel="noopener noreferrer" aria-label="Sincan konum">
				<span class="icon">📍</span>
				<span class="label">Sincan</span>
			</a>

			<a class="card" href="tel:+903122726261" aria-label="D Diamond Forum telefon">
				<span class="icon">📞</span>
				<span class="label">D Diamond Forum</span>
			</a>

			<a class="card" href="tel:+903122726261" aria-label="Sincan telefon">
				<span class="icon">📞</span>
				<span class="label">Sincan</span>
			</a>

			<a class="card" href="linkackatalog.html" aria-label="Katalog">
				<span class="icon">🪙</span>
				<span class="label">Katalog</span>
			</a>

			<a class="card" href="https://g.page/r/" target="_blank" rel="noopener noreferrer" aria-label="Google yorumlar">
				<span class="icon">🟦</span>
				<span class="label">Yorumlarınız</span>
			</a>

			<a class="card" href="https://wa.me/903122726261?text=Merhaba%2C%20IBAN%20bilgilerinizi%20alabilir%20miyim%3F" target="_blank" rel="noopener noreferrer" aria-label="IBAN bilgileri">
				<span class="icon">₺</span>
				<span class="label">IBAN Bilgilerimiz</span>
			</a>
		</section>

		<p class="hint">Mobil odaklı hızlı bağlantı ekranı</p>
	</main>

	<script>
		(function () {
			var video = document.getElementById('bgVideo');
			var playBtn = document.getElementById('videoFallbackBtn');
			if (!video) return;

			video.muted = true;
			video.playsInline = true;
			video.setAttribute('muted', 'muted');
			video.setAttribute('playsinline', 'playsinline');

			function showPlayButton() {
				if (playBtn) playBtn.style.display = 'inline-flex';
			}

			function hidePlayButton() {
				if (playBtn) playBtn.style.display = 'none';
			}

			function tryPlay() {
				var p = video.play();
				if (p && typeof p.catch === 'function') {
					p.then(hidePlayButton).catch(function () {
						showPlayButton();
					});
				}
			}

			video.addEventListener('playing', hidePlayButton);
			video.addEventListener('pause', showPlayButton);
			video.addEventListener('error', function () {
				var fallbackSrc = video.getAttribute('data-fallback-src');
				if (fallbackSrc && video.currentSrc.indexOf(fallbackSrc) === -1) {
					video.src = fallbackSrc;
					video.load();
					tryPlay();
					return;
				}
				showPlayButton();
			});

			if (playBtn) {
				playBtn.addEventListener('click', function () {
					tryPlay();
				});
			}

			['touchstart', 'click'].forEach(function (evt) {
				document.addEventListener(evt, function once() {
					tryPlay();
					document.removeEventListener(evt, once);
				}, { once: true });
			});

			tryPlay();
		})();
	</script>
</body>
</html>
